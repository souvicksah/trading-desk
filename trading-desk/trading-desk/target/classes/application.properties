# ── Datasource ──────────────────────────────────────────────spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=system
spring.datasource.password=test
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# HikariCP tuning for concurrent trading load
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ─────────────────────────────────────────
# "none" — schema is managed by schema.sql, not auto-generated
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
# Explicit transaction isolation for concurrency safety
spring.jpa.properties.hibernate.connection.isolation=2

# ── SQL Initialisation ───────────────────────────────────────
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

# ── Logging ──────────────────────────────────────────────────
logging.level.com.trading.desk=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.transaction=WARN
